langcode: en
status: true
dependencies:
  config:
    - filter.format.basic_html
  module:
    - ckeditor5
format: basic_html
editor: ckeditor5
settings:
  toolbar:
    items:
      - aickeditor
      - drupalMedia
      - bold
      - italic
      - underline
      - superscript
      - subscript
      - specialCharacters
      - link
      - horizontalLine
      - alignment
      - heading
      - '-'
      - bulletedList
      - numberedList
      - blockQuote
      - code
      - sourceEditing
  plugins:
    ai_ckeditor_ai:
      dialog:
        autoresize: 'min-width: 600px'
        height: '750'
        width: '900'
        dialog_class: ai-ckeditor-modal
      plugins:
        ai_agents_ckeditor:
          agents: {  }
          enabled: false
        ai_automators_ckeditor:
          enabled: false
          workflows: {  }
        ai_ckeditor_completion:
          enabled: true
          provider: openai__gpt-5.2
        ai_ckeditor_help:
          enabled: false
        ai_ckeditor_modify_prompt:
          enabled: true
          provider: openai__gpt-5.2
        ai_ckeditor_reformat_html:
          enabled: true
          provider: openai__gpt-5.2
        ai_ckeditor_spellfix:
          enabled: true
          provider: openai__gpt-5.2
        ai_ckeditor_summarize:
          enabled: true
          provider: openai__gpt-5.2
        ai_ckeditor_tone:
          enabled: false
          provider: openai__gpt-5.2
          autocreate: false
          tone_vocabulary: tags
          use_description: false
        ai_ckeditor_translate:
          enabled: false
          provider: openai__gpt-5.2
          language_source: tax
          autocreate: false
          translate_vocabulary: tags
          use_description: false
    ckeditor5_alignment:
      enabled_alignments:
        - center
        - justify
        - left
        - right
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
        styles: true
      multiBlock: true
    ckeditor5_sourceEditing:
      allowed_tags:
        - '<cite>'
        - '<dl>'
        - '<dt>'
        - '<dd>'
        - '<a hreflang>'
        - '<blockquote cite>'
        - '<h2 id>'
        - '<h3 id>'
        - '<h4 id>'
        - '<h5 id>'
        - '<h6 id>'
    linkit_extension:
      linkit_enabled: true
      linkit_profile: default
    media_media:
      allow_view_mode_override: true
image_upload:
  status: true
  scheme: public
  directory: inline-images
  max_size: null
  max_dimensions:
    width: null
    height: null
