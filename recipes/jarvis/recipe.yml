name: 'Jarvis'
description: 'Bootstraps a new Drupal site with the Jarvis theme: custom modules, Canvas + media plumbing, the Blog/Basic/Landing content types, and curated demo content (home page, blog posts, about page, media). Installs AND configures the AI stack (providers, Canvas agents, CKEditor AI, alt-text) — everything except API keys, which ship separately via the private jarvis_ai overlay. Contains no secrets; safe to share.'
type: 'Site'
install:
  # Core + contrib plumbing
  - media
  - media_library
  - image
  - link
  - menu_ui
  - menu_link_content
  - datetime
  - options
  - path
  - navigation
  - block_content
  - layout_builder
  - editor
  - ckeditor5
  - help
  - default_content
  - twig_tweak
  - linkit
  - token
  - token_filter
  - crop
  - focal_point
  - canvas
  - canvas_field_component
  - backup_migrate
  - asset_injector
  - simple_gmap
  # Editorial accessibility checker — flags content-level WCAG issues (missing
  # alt, skipped headings, vague link text) inline for editors; complements the
  # theme's build-time contrast safeguards.
  - editoria11y
  - modeler_api
  # AI stack — installed unconfigured, NO keys ship here
  - key
  - ai
  - ai_agents
  # Both shipped editors carry the ai_automators_ckeditor toolbar plugin.
  - ai_automators
  - ai_ckeditor
  - ai_assistant_api
  - ai_chatbot
  - ai_image_alt_text
  - ai_media_image
  - ai_provider_anthropic
  - ai_provider_openai
  - gemini_provider
  - canvas_ai
  # Admin UX: the navigation sidebar's Shortcuts block needs the shortcut
  # module; Claro is the admin theme (set in config actions below).
  - shortcut
  - claro
  # Custom modules shipped in this codebase
  - jarvis_blocks
  - jarvis_canvas
  # The theme
  - jarvis
config:
  # Recipes deliberately skip config ENTITIES shipped by the modules they
  # install (RecipeRunner sets the config installer to syncing during module
  # install) — without this import list the site has no admin views
  # (content/media/files/people listings), no media_library image style, no
  # navigation menus, no shortcut set: the admin UI looks gutted. Importing
  # creates only what does not already exist, straight from each module's
  # config/install + config/optional.
  import:
    ai_automators: '*'
    navigation: '*'
    shortcut: '*'
    node: '*'
    media: '*'
    media_library: '*'
    block_content: '*'
    file: '*'
    taxonomy: '*'
    dblog: '*'
    canvas: '*'
    editoria11y: '*'
    backup_migrate: '*'
    linkit: '*'
    user:
      # Explicit: user/optional also ships search.page.user_search, whose
      # search-module dependency is not installed here.
      - views.view.user_admin_people
  actions:
    system.theme:
      simpleConfigUpdate:
        default: jarvis
        admin: claro
    node.settings:
      simpleConfigUpdate:
        # Edit/add content in the admin theme, like the standard profile.
        use_admin_theme: true
    system.site:
      simpleConfigUpdate:
        page.front: /home
