  field_body:
    -
      value: '<p>Single Directory Components (SDC) in Drupal 11 provide a component-first approach to theming that keeps templates, styles, scripts, and metadata together in one place. This structure improves maintainability, encourages reuse, and reduces the friction between backend rendering and frontend design systems.</p><hr><h3>What Single Directory Components Are</h3><p>Single Directory Components group everything needed to render a UI component inside a single folder. A typical component includes a Twig template, optional CSS/JS, and a component definition file that documents properties and enables tooling support.</p><p>SDC aligns well with modern frontend practices: components become portable building blocks, and component APIs become explicit through defined props.</p><h3>Why SDC Helps Theme Development</h3><ul><li data-list-item-id="ee0737049b6b2ea2289915141e899e66e"><strong>Consistency:</strong> Component conventions reduce ad-hoc theming patterns across templates.</li><li data-list-item-id="ed6e6f0a66adead76d188632e4b423d25"><strong>Encapsulation:</strong> Styles and markup live together, limiting unintended cross-component side effects.</li><li data-list-item-id="e9034fc6a6ea40203b86231e4a5776955"><strong>Reusability:</strong> Components can be used across node templates, views, blocks, and layout sections.</li><li data-list-item-id="e6d21f74c4e29ee29d04d4c28338a93b4"><strong>Documentation:</strong> Component metadata makes intended usage and inputs clear.</li><li data-list-item-id="e4c5475bc7ec14f1b72d430f0f42ee7ca"><strong>Team workflow:</strong> Backend and frontend work can converge on stable component interfaces.</li></ul><hr><h3>Theme Structure for SDC</h3><p>A Drupal 11 theme can adopt SDC by creating a dedicated components directory. The exact structure can vary, but a clear convention helps long-term scalability.</p><p><strong>Example component-oriented structure:</strong></p><ul><li class="ck-list-marker-bold" data-list-item-id="e2d2af8c105876e45479d3a49e6de7867"><strong>themes/custom/example_theme/</strong><ul><li data-list-item-id="eb784bbe25a2ca587945522339ebd3631">example_theme.info.yml</li><li data-list-item-id="e06f06ea2347b608b71581945c47eb575">example_theme.libraries.yml</li><li data-list-item-id="edb099739995a86d723f83dd8048d193c">components/<ul><li data-list-item-id="e6e272e1b661992710e4c4091fa7a7b58">button/<ul><li data-list-item-id="ef8d330ddfeddab788865a89b423ab86f">button.twig</li><li data-list-item-id="efe3c43c2a6ffbfa8c7c4c9bcdb3311b6">button.component.yml</li><li data-list-item-id="e192f47483e8e9c8375eb5e2c745f39a5">button.css</li><li data-list-item-id="efe85c79fdd38fe03a35fd54bddfe4e21">button.js</li></ul></li><li data-list-item-id="e972687557463abf4a598acfb06be54b9">card/<ul><li data-list-item-id="e2665af84f7f1b3e69aefad745ba2ff3c">card.twig</li><li data-list-item-id="eafbf7f71407780acf21e126766f882f3">card.component.yml</li><li data-list-item-id="e12d7887ec9810fe78ab5de8b3fb8f64e">card.css</li></ul></li></ul></li><li data-list-item-id="e6c7ccd736501238eef0856c2281ec9ec">templates/</li><li data-list-item-id="e7f768314bb60d7f746be3fc031cadab7">css/</li><li data-list-item-id="e0e35b3316b207ec29aefae77afcc71f0">js/</li></ul></li></ul><p>Component folders contain only what the component needs. Global assets remain possible, but SDC encourages moving UI-specific assets closer to the template that requires them.</p><hr><h3>Defining a Component</h3><p>An SDC component typically includes:</p><dl><dt><p><strong>Twig template</strong></p></dt><dd><p>Defines markup and consumes props passed to the component.</p></dd><dt><p><strong>Component definition file</strong></p></dt><dd><p>Declares props and component metadata for discoverability and validation.</p></dd><dt><p><strong>Optional CSS/JS</strong></p></dt><dd><p>Scoped assets that implement the visual and behavioral aspects of the component.</p></dd></dl><h4>Component Metadata and Props</h4><p>A component definition file documents the component API. Keeping prop names stable and meaningful reduces theme coupling and simplifies refactoring.</p><ul><li data-list-item-id="e3a61a8c7c74bd7650f959dae9bd47c0f"><strong>Prefer explicit props</strong> such as <code>label</code>, <code>url</code>, <code>variant</code>, <code>icon</code>.</li><li data-list-item-id="e7a6cf4af22379c192bcd3d7695aba162"><strong>Use safe defaults</strong> for optional props to prevent rendering edge cases.</li><li data-list-item-id="ef9792badba5809a8bd595f10e61790a9"><strong>Constrain variants</strong> to a known set (example: primary, secondary, ghost) for predictable styling.</li></ul><hr><h3>Rendering Components in Twig</h3><p>Once components exist, templates can be refactored to compose pages from smaller parts. This approach works well for node templates, field templates, Views templates, and layout templates.</p><p><strong>Practical guidance for component composition:</strong></p><ul><li data-list-item-id="ef1a45cfb53a39fb455b916d8b8529434"><strong>Keep components small</strong> and focused on a single UI responsibility.</li><li data-list-item-id="eb4702ec37525c33977dfbeef8a84cf4a"><strong>Avoid embedding business logic</strong> in components; perform data shaping upstream.</li><li data-list-item-id="e41d5a337c11a0416ed8e3fd7da3d239a"><strong>Pass only what is needed</strong> to keep component APIs clean.</li></ul><h4>Example: Card Component Usage</h4><p>A card component can accept props such as title, summary, image, and link. Node and View templates can map Drupal render arrays or fields into these props, resulting in consistent UI across multiple contexts.</p><hr><h3>Managing Assets with SDC</h3><p>SDC supports component-level assets, improving maintainability by keeping styles and scripts close to their usage. Several patterns can work in Drupal 11 themes:</p><ul><li data-list-item-id="e4a3913046eb69de9650b055e6ab77263"><strong>Component-local CSS/JS</strong> for encapsulated behavior and styling.</li><li data-list-item-id="ed36dbbbd48dc6eeb84a31b142c173b04"><strong>Shared utilities</strong> for layout primitives, typography scales, and tokens.</li><li data-list-item-id="e90d6536c2651d6b96a8fa54f16b57e95"><strong>Hybrid approach</strong> where global foundation styles remain global, while component styling stays within components.</li></ul><h4>Recommendations for CSS Organization</h4><ul><li data-list-item-id="e006d2447e8a823c382cdbf796a2c68cd"><strong>Use a naming convention</strong> such as BEM or a utility-first approach, and apply it consistently.</li><li data-list-item-id="ebcd9692aa1b07337d04ad48b87732d3d"><strong>Prefer low specificity</strong> to reduce conflicts and ease overrides.</li><li data-list-item-id="e83f2176fc5a1d6cfdd8850b59e5bc25f"><strong>Isolate variants</strong> with modifier classes rather than deeply nested selectors.</li></ul><hr><h3>Mapping Drupal Data to Component Props</h3><p>Drupal content often arrives as render arrays, fields, and preprocess variables. The goal is to translate these into clean component props.</p><ul><li data-list-item-id="e7f4b19aa677f4698e1d68ba938fe7e0a"><strong>Preprocess functions</strong> can normalize data, set defaults, and compute variants.</li><li data-list-item-id="e68e655eeaa55edf993f7da6be5d1fb18"><strong>Field templates</strong> can pass field values into components for consistent rendering.</li><li data-list-item-id="ee20651d04fc6fa07d498ddf08d85d38e"><strong>View modes</strong> can provide predictable data shapes per context (teaser vs full).</li></ul><h4>Preprocess Strategy</h4><p>Prop shaping belongs in preprocess layers rather than inside Twig. This keeps Twig focused on presentation and reduces duplication across templates that share the same component.</p><hr><h3>Component Documentation and Governance</h3><p>SDC becomes significantly more valuable when treated as a theme-level design system. A small amount of governance prevents component sprawl.</p><ul><li data-list-item-id="ef9550f9b100eb281a94caa3ebea52496"><strong>Define component categories</strong> such as atoms (button), molecules (card), and organisms (header).</li><li data-list-item-id="e1e08fdc4f1b97c20f5c7f4767f03cd0c"><strong>Write prop descriptions</strong> and keep examples of expected values.</li><li data-list-item-id="eda716227cb9d97bc421e3780cf8058e6"><strong>Set deprecation practices</strong> when prop names or variants need to change.</li></ul><blockquote><p><cite>Principle:</cite> A component should be easier to reuse than to reimplement.</p></blockquote><hr><h3>Testing and QA Considerations</h3><p>Component-driven theming can improve QA by making UI behavior more predictable.</p><ul><li data-list-item-id="e1b50e2f21f0ead10f6b6c0bb23461554"><strong>Visual review:</strong> verify components in multiple contexts (node, view, block).</li><li data-list-item-id="ed456c515c524f6fa7ee7e20949dc86b9"><strong>Accessibility:</strong> ensure correct semantics, focus states, and keyboard support.</li><li data-list-item-id="e444f07f28f10e162009915035ab708b7"><strong>Performance:</strong> avoid unnecessary JS per component; prefer progressive enhancement.</li></ul><h4>Accessibility Checklist for Common Components</h4><ul><li data-list-item-id="e1ddff83e1824ababff8a2c9c8d1afb32"><strong>Buttons and links</strong> use correct elements for intent.</li><li data-list-item-id="e8016a66ca4159a4c42f7c65b5b0d2aa4"><strong>Images</strong> provide meaningful alternative text when appropriate.</li><li data-list-item-id="e8f22c948953c31444d650e7e51815099"><strong>Interactive elements</strong> include visible focus and work without a mouse.</li></ul><hr><h3>Migration Path: Refactoring an Existing Theme</h3><p>Adopting SDC does not require a full rewrite. A gradual approach reduces risk.</p><ol><li data-list-item-id="e1a2950421ed4e6fa48b1a154ac480d9e"><strong>Start with one or two shared components</strong> such as buttons and cards.</li><li data-list-item-id="eb93f6570d51a71b0f9e8293d2aabf98c"><strong>Refactor the highest-traffic templates</strong> to consume components.</li><li data-list-item-id="eb06677227401ac9edb4e19242a8a23a9"><strong>Consolidate variants</strong> and remove duplicated markup across templates.</li><li data-list-item-id="eed39fd0e86941d86a07936fa30d7e256"><strong>Move component-specific CSS</strong> out of global stylesheets where feasible.</li><li data-list-item-id="e2e4ec4267aa3ce834555d55c0f65efcd"><strong>Document component APIs</strong> and enforce consistent usage.</li></ol><hr><h3>Common Pitfalls</h3><ul><li data-list-item-id="e73f8155ffc336756c88a99e038d29635"><strong>Over-componentization:</strong> creating components for trivial markup can increase complexity.</li><li data-list-item-id="e148c1119f46a791f236565d25520a39d"><strong>Leaky abstractions:</strong> passing entire render arrays into components instead of clean props.</li><li data-list-item-id="eaecf8f611b1a356283b4530721d81092"><strong>Inconsistent variants:</strong> multiple names for the same visual intent.</li><li data-list-item-id="ed75c80c3ff581e27dde4b5f7bcbc192e"><strong>Global CSS overrides:</strong> high-specificity rules that undermine encapsulation.</li></ul><hr><h3>Conclusion</h3><p>Single Directory Components in Drupal 11 enable a modern, scalable theming workflow built on reusable UI building blocks. By defining clear component APIs, keeping assets close to templates, and shaping Drupal data into clean props, a theme can evolve into a maintainable design system that supports long-term site growth.</p><p>SDC rewards incremental adoption: begin with foundational components, standardize patterns, and expand the library as repeated UI needs emerge.</p>'
