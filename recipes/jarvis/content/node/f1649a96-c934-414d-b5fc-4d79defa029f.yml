  field_body:
    -
      value: '<p dir="ltr">A good component library gives you range without chaos. Jarvis ships with a full set of building blocks: hero, card, text, image, video, call to action, stat, person, map, button, and more. Each one is a Single Directory Component, defined once and reused everywhere. You drop them in, set a few options, and move on.</p><p dir="ltr"><strong>The layout components are where the flexibility shows.</strong> Take the three-column section. On desktop it shows three columns. On a tablet it folds to two. On a phone it stacks into a single full-width column. You do not write a line of CSS to make that happen. It is built in.</p><p dir="ltr">The options go further. <strong>Each section can be boxed or full width.</strong> You can set a background color, drop in a background image with an overlay, and adjust the gap between columns. One control sets the text color for every component inside the section at once. Choose the color once, and the text, links, and WYSIWYG content all follow. No editing each block by hand.</p><p dir="ltr">Here is the part we care about most. <strong>Accessibility is not an add-on.</strong> When you pick a text color, Jarvis checks the contrast against the background. If a combination would fail ADA standards, the theme does not offer it. You cannot accidentally ship white text on a pale image. The choices you are allowed to make are the accessible ones.</p><p dir="ltr"><strong>That is the whole idea. Give site builders real flexibility, then quietly protect them from the mistakes that flexibility usually invites.</strong></p><p dir="ltr">Build the page you imagined. Trust that it stays readable for everyone.</p><p dir="ltr"><strong>The List of Components</strong></p><ul dir="ltr"><li data-list-item-id="e2f5791b3279f990973d73dffae6748e6">Card</li><li data-list-item-id="e63dba93881f970d850d302949631f43e">Card Full Image</li><li data-list-item-id="e7473802372048a4e4966c89021b62805">CTA</li><li data-list-item-id="ec195765eb1c02df1f897cb1a13c1f201">Hero</li><li data-list-item-id="e77d1dce67260e3a9e8303afe595bfaa2">Image</li><li data-list-item-id="e41a671e0172ec39f35fd31c3ecdb0435">Map</li><li data-list-item-id="ee7aed19dbb2cb51e8e5f4f546fc6e609">Person</li><li data-list-item-id="e5c1cb0ca0092837990f16e41eece3df6">Section</li><li data-list-item-id="ed391b367d5f5d33a182fd46d7cbde51f">Stat</li><li data-list-item-id="e40888b72f7402bebfc58abb9bf678cb6">Text</li><li data-list-item-id="ee978dab548ad9d8e01cadefa7783b25e">Video</li><li data-list-item-id="e62598472df4b7d7e3094b9e86360e53e">Wysiwyg (basic or full html with image embed and a slide out editing section)</li></ul>'
