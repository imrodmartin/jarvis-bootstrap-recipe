name: 'Jarvis AI keys (private overlay)'
description: 'PRIVATE, LOCAL-ONLY overlay: imports the Key entities holding API credentials for the AI providers the jarvis recipe installs and configures. The key.key.*.yml files are GITIGNORED (plaintext, never committed) — supply your own in config/, then apply this after the jarvis recipe. Without the files this recipe is a harmless no-op and the providers simply run unconfigured.'
type: 'Site'
config:
  # Non-strict so re-applying after a key value changed does not hard-fail;
  # recipes never update existing config, so edit keys via the Key UI (or
  # delete + re-apply) once imported.
  strict: false
install:
  - key
